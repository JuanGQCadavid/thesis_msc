---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
    spec:
      containers:
        - name: proxy
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - "/bin/main"
          args:
            - "listen"
            - "-c"
            - "/config/config.yaml"
          ports:
            - containerPort: 8080
              name: app
          volumeMounts:
            - name: config
              mountPath: /config
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Chart.Name }}-config