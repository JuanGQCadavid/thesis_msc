---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-local
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  internalTrafficPolicy: Local
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}
spec:
  ingressClassName: nginx
  rules:
    - host: reverse-proxy.172.17.90.93.nip.io
      http:
        paths:
          - backend:
              service:
                name: {{ .Chart.Name }}
                port:
                  number: 80
            path: /
            pathType: Prefix